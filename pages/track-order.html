<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-39E6NXKX8R"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-39E6NXKX8R');</script>
    <title>Track Order | FOMO Bakery</title>
    <meta name="description" content="Track your FOMO Bakery order status.">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Track Order | FOMO Bakery">
    <meta property="og:description" content="Track your FOMO Bakery order status.">
    <meta property="og:image" content="https://fomobakery.com/assets/fomo-logo.png">
    <meta property="og:url" content="https://fomobakery.com/pages/track-order">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .track-container {
            max-width: 600px;
            margin: 140px auto 80px;
            padding: 0 24px;
            text-align: center;
        }

        .track-title {
            font-family: 'Fraunces', serif;
            font-size: 2.5rem;
            color: var(--color-deep-chocolate);
            margin-bottom: 24px;
        }

        .track-subtitle {
            font-family: 'Outfit', sans-serif;
            color: var(--color-text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .track-actions {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .divider {
            margin: 32px 0;
            position: relative;
            width: 100%;
            height: 1px;
            background: var(--color-soft-sand);
        }

        .divider span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--color-warm-white);
            padding: 0 16px;
            color: var(--color-text-secondary);
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <nav class="navbar scrolled">
        <div class="nav-container">
            <a href="../index.html" class="logo"><img src="../assets/fomo-logo.webp" alt="FOMO" class="logo-img"></a>
            <ul class="nav-links">
                <li><a href="../shop/index.html">Shop</a></li>
                <li><a href="../account/login">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="track-container">
        <h1 class="track-title">Track Your Order</h1>
        <p class="track-subtitle">
            To view the status of your order, please log in to your account.
            Once your order ships, you will receive a tracking link via email or SMS.
        </p>

        <div class="track-actions">
            <a href="https://fomobakery.myshopify.com/account/login" class="btn btn-primary btn-large">
                Log In to View Orders
            </a>
        </div>

        <div class="divider"><span>OR</span></div>

        <p class="track-subtitle">Have a question about your shipment?</p>
        <a href="mailto:support@fomobakery.com" class="btn btn-outline">Contact Support</a>
    </div>

    <footer id="site-footer" class="footer"></footer>

    <script type="module" src="../script.js"></script>
</body>

</html>
